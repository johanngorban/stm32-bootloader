name: cd

on:
  workflow_run:
    workflows: [ci]
    branches: [main]
    types: [completed]

jobs:
  release:
    if: >-
      github.event_name == 'push' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout validated commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          submodules: recursive

      - name: Read version
        id: ver
        run: |
          version="$(make -s print-version)"
          if [ -z "$version" ]; then
            echo "no semantic version found in VERSION" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Check whether this version is already released
        id: guard
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ steps.ver.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install arm-none-eabi-gcc
        if: steps.guard.outputs.exists == 'false'
        uses: carlosperate/arm-none-eabi-gcc-action@v1
        with:
          release: "14.2.Rel1"

      - name: Build release artifacts
        if: steps.guard.outputs.exists == 'false'
        run: make release

      - name: Publish release
        if: steps.guard.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          target_commitish: ${{ github.event.workflow_run.head_sha }}
          files: build/release/*.bin
          fail_on_unmatched_files: true
          generate_release_notes: true
